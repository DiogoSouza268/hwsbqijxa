<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio_4_HTML_E_CSS_Diogo Da Silva Souza</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/lancamento.css">
</head>
<body>
    <header>
        <img src="../img/logo-ford-256.png" alt="Logo da Ford Do Header">
        <nav>
            <a href="../../index.html">Home</a>
            <a href="./lancamento.html">Lançamento</a>
            <a href="./contato.html">Contato</a>
        </nav>
    </header>

    <main>
        
        <section id="video">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/vQsryuNmsL0?si=B243M9rPNRumZXSw"
                title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media;
                gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
            </iframe>
        </section>
     
        <section id="carros">

            <div id="Ranger">
                <div class="modelos">
                    <img src="../img/storm.jpg" alt="Ford Storm">
                    <div class="descricao">
                        <input type="checkbox" class="option">
                
                        <div class="modeloEpreco">
                            <p class="paragrafo">XL Cabine Simples 2.2 Diesel <br> 4X4 MT 2022.</p>
                            <p class="paragrafo2">Preço Sugerido: R$ 183.850</p>
                        </div>
                        <img src="../img/info.png" alt="Info" class="info">
                    </div>
                </div>
                <div class="modelos">
                    <img src="../img/XL Cabine.jpg" alt="XL Cabine" >
                    <div class="descricao">
                        <input type="checkbox" class="option">
                
                        <div class="modeloEpreco">
                            <p class="paragrafo">XLS 2.2 Diesel 4X4 AT 2022.</p>
                            <p class="paragrafo2">Preço Sugerido: R$ 220.690</p>
                        </div>
                        <img src="../img/info.png" alt="Info" class="info">
                    </div>
                </div>
                <div class="modelos">
                    <img src="../img/xls 2.2 diesel.jpg" alt="Xls 2.2 Diesel">
                    <div class="descricao">
                        <input type="checkbox" class="option">
                
                        <div class="modeloEpreco">
                            <p class="paragrafo">Storm 3.2 Diesel 4X4 AT 2022.</p>
                            <p class="paragrafo2">Preço Sugerido: R$ 222.790</p>
                        </div>
                        <img src="../img/info.png" alt="Info" class="info">
                    </div>
                </div>
            </div>
        </section>

        <section id="Botao">
            <input type="submit" value="Comparar Carros">
        </section>
    </main>

    <footer>
        <div id="Redes">
            <p>Redes Sociais</p>
            <a href="https://www.facebook.com/FordBrasil/?locale=pt_BR" target="_blank"><img src="../img/facebook-50.png" alt="Logo do Facebook"></img></a>
            <a href="https://www.youtube.com/fordbrasil" target="_blank"><img src="../img/youtube-squared-50.png" alt="Logo do Facebook"></img></a>
            <a href="https://www.instagram.com/fordbrasil/" target="_blank"><img src="../img/instagram-logo-50.png" alt="Logo do Facebook"></img></a>
        </div>
        <p>&copy; 2026 Ford Brasil. Todos os direitos reservados</p>

        <img src="../img/ford-96.png" alt="Logo Da Ford">
    </footer>
    
</body>
</html>
