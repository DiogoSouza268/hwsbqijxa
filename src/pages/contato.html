<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio_4_HTML_E_CSS_Diogo Da Silva Souza</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/contato.css">
</head>
<body>

    <header>
        <img src="../img/logo-ford-256.png" alt="Logo da Ford Do Header">
        <nav>
            <a href="../../index.html">Home</a>
            <a href="./lancamento.html">Lançamento</a>
            <a href="./contato.html">Contato</a>
        </nav>
    </header>

    <main>
        <section id="imagem">
            <img src="../img/xls 2.2 diesel.jpg" alt="xls 2.2 diesel">
        </section>

        <section id="formulario">
            <form>
                <p>Sobre Você:</p>
                <input type="text" placeholder="Nome Do Usuario*" class="inputs">
                <input type="email" placeholder="E-mail Para Contato*" class="inputs">
                <input type="number" placeholder="Telefone*" class="inputs">
                <input list="Contatos" id="Contato" name="Contato" placeholder="Tipo De Contato*" class="inputs">
                <datalist id="Contatos">
                    <option value="Elogio">
                    <option value="Reclamação">
                    <option value="Solicitação">
                </datalist>
                <input type="text" placeholder="Insira Uma Mensagem*" class="inputs">
                <input type="submit" value="Enviar" id="Enviar">
            </form>
        </section>

    </main>

    <footer>
        <div id="Redes">
            <p>Redes Sociais</p>
            <a href="https://www.facebook.com/FordBrasil/?locale=pt_BR" target="_blank"><img src="../img/facebook-50.png" alt="Logo do Facebook"></img></a>
            <a href="https://www.youtube.com/fordbrasil" target="_blank"><img src="../img/youtube-squared-50.png" alt="Logo do Facebook"></img></a>
            <a href="https://www.instagram.com/fordbrasil/" target="_blank"><img src="../img/instagram-logo-50.png" alt="Logo do Facebook"></img></a>
        </div>

        <img src="../img/ford-96.png" alt="Logo Da Ford">
    </footer>
    
    
</body>
</html>
